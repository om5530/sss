<div class="adm-shell">
  <aside class="adm-side">
    <a routerLink="/admin" class="adm-side__brand">
      <img src="logo-mark.svg" alt="" width="30" height="30" />
      <span>
        sweet savory savor
        <small>Admin console</small>
      </span>
    </a>

    <nav class="adm-side__nav" aria-label="Admin">
      <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M4 13h6V4H4v9Zm10 7h6v-9h-6v9ZM4 20h6v-4H4v4Zm10-12h6V4h-6v4Z" stroke-linejoin="round" />
        </svg>
        Dashboard
      </a>
      <a routerLink="/admin/queue" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <circle cx="12" cy="12" r="8.5" /><path d="M12 7.5V12l3 2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Live queue
      </a>
      <a routerLink="/admin/prep" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M8 3.5h8v4H8v-4Z" stroke-linejoin="round" /><path d="M5 7.5h14V20a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V7.5Z" stroke-linejoin="round" /><path d="M9 12h6M9 16h4" stroke-linecap="round" />
        </svg>
        Prep sheet
      </a>
      <a routerLink="/admin/orders" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M6 3h12v18l-2-1.4L14 21l-2-1.4L10 21l-2-1.4L6 21V3Z" stroke-linejoin="round" /><path d="M9 8h6M9 12h6" stroke-linecap="round" />
        </svg>
        Orders
      </a>
      <a routerLink="/admin/products" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M4 8.5 12 4l8 4.5v7L12 20l-8-4.5v-7Z" stroke-linejoin="round" /><path d="M4 8.5 12 13l8-4.5M12 13v7" stroke-linejoin="round" />
        </svg>
        Products
      </a>
      <a routerLink="/admin/customers" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <circle cx="9" cy="8.5" r="3.2" /><path d="M3.5 19a5.5 5.5 0 0 1 11 0M15.5 12a3.2 3.2 0 1 0-2.2-5.5M15 15.6c2.8.4 5 1.8 5.5 3.4" stroke-linecap="round" />
        </svg>
        Customers
      </a>
      <a routerLink="/admin/payments" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <rect x="3" y="6" width="18" height="13" rx="2.5" /><path d="M3 10.5h18" />
        </svg>
        Payments
      </a>
      <a routerLink="/admin/enquiries" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="2.5" /><path d="m4 7 8 6 8-6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Enquiries
      </a>
      <a routerLink="/admin/cake-requests" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M4 20h16M5 20v-6.5A2.5 2.5 0 0 1 7.5 11h9a2.5 2.5 0 0 1 2.5 2.5V20" stroke-linecap="round" stroke-linejoin="round" /><path d="M12 11V8.5" stroke-linecap="round" /><path d="M12 8.5a1.6 1.6 0 0 0 1.6-1.6c0-.9-1.6-2.9-1.6-2.9s-1.6 2-1.6 2.9A1.6 1.6 0 0 0 12 8.5Z" stroke-linejoin="round" /><path d="M5 15.5c1.2 1 2.3 1 3.5 0s2.3-1 3.5 0 2.3 1 3.5 0 2.3-1 3.5 0" stroke-linecap="round" />
        </svg>
        Cake requests
      </a>
      <a routerLink="/admin/coupons" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h11A2.5 2.5 0 0 1 20 8.5v1a2.5 2.5 0 0 0 0 5v1a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 15.5v-1a2.5 2.5 0 0 0 0-5v-1Z" stroke-linejoin="round" /><path d="M10 9.5 14 14.5M10 14.5h.01M14 9.5h.01" stroke-linecap="round" />
        </svg>
        Coupons
      </a>
      <a routerLink="/admin/reports" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M4 20V10M10 20V4m6 16v-7m4 7H4" stroke-linecap="round" />
        </svg>
        Reports
      </a>
      <a routerLink="/admin/qr" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <rect x="3.5" y="3.5" width="7" height="7" rx="1.2" /><rect x="13.5" y="3.5" width="7" height="7" rx="1.2" /><rect x="3.5" y="13.5" width="7" height="7" rx="1.2" /><path d="M13.5 13.5h3v3h-3zM17.5 17.5h3v3h-3z" stroke-linejoin="round" />
        </svg>
        Table QRs
      </a>
      <a routerLink="/admin/activity" routerLinkActive="active" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M3 12h4l2.5-6 4 12L16 12h5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Activity
      </a>
    </nav>

    <div class="adm-side__foot">
      <a routerLink="/" class="adm-side__link">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M3 10.5 12 3l9 7.5M5.5 9v11h13V9" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>View store</span>
      </a>
      <button type="button" class="adm-side__link" (click)="signOut()" style="background: none; border: none; width: 100%; text-align: left">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M15 4H6v16h9m-4-8h10m-3.5-3.5L21 12l-3.5 3.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>Sign out</span>
      </button>
    </div>
  </aside>

  <main class="adm-main">
    <router-outlet />
  </main>
</div>
