@if (cancelled()) {
  <div class="tracker tracker--cancelled" role="status">
    <span class="tracker__x" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="m6.5 6.5 11 11m0-11-11 11" stroke-linecap="round" />
      </svg>
    </span>
    <div>
      <strong>Order cancelled</strong>
      <p>This order is no longer being prepared.</p>
    </div>
  </div>
} @else {
  <ol class="tracker" [class.tracker--complete]="complete()">
    @for (status of flow; track status; let i = $index) {
      <li
        class="tracker__step"
        [class.is-done]="isDone(i)"
        [class.is-current]="i === currentIndex()"
        [attr.aria-current]="i === currentIndex() ? 'step' : null"
      >
        <span class="tracker__node" aria-hidden="true">
          @if (i < currentIndex() || (complete() && i === currentIndex())) {
            <svg class="tracker__check" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4">
              <path d="m5 12.5 4.4 4.5L19 7" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          } @else if (i === currentIndex()) {
            <span class="tracker__core"></span>
          }
        </span>
        <span class="tracker__label">{{ labels[status] }}</span>
      </li>
    }
  </ol>
}
