<div class="toasts" aria-live="polite">
  @for (t of view(); track t.id) {
    <div
      class="toast"
      role="status"
      [class]="'toast--' + t.type"
      [class.toast--leaving]="t.leaving"
      (click)="dismiss(t)"
    >
      <span class="toast__icon" aria-hidden="true">
        @switch (t.type) {
          @case ('success') {
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9" opacity="0.35" /><path d="m8.5 12.2 2.4 2.4 4.8-5" stroke-linecap="round" stroke-linejoin="round" /></svg>
          }
          @case ('error') {
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9" opacity="0.35" /><path d="m9.2 9.2 5.6 5.6m0-5.6-5.6 5.6" stroke-linecap="round" /></svg>
          }
          @default {
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9" opacity="0.35" /><path d="M12 11v5" stroke-linecap="round" /><circle cx="12" cy="7.8" r="0.4" fill="currentColor" /></svg>
          }
        }
      </span>
      <span class="toast__msg">{{ t.message }}</span>
    </div>
  }
</div>
