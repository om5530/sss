name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npm test
        working-directory: server
        env:
          # mongodb-memory-server downloads its binary on first run; cache-friendly default path.
          MONGOMS_DOWNLOAD_DIR: ${{ runner.temp }}/mongodb-binaries

  client-build:
    name: Client build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npx ng build
        working-directory: client
